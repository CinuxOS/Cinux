name: Cinux CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  host-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3

      - name: Compiler version
        run: echo "GCC $(gcc --version | head -1)"

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run host tests
        working-directory: build
        run: make test_host

  line-limits:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Check line-count limits
        run: python3 scripts/check_line_limits.py --hpp 500

      - name: Check freestanding headers
        run: python3 scripts/check_freestanding_headers.py

  kernel-tests:
    name: kernel-tests (${{ matrix.build_type }}, ${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # F-QA Q1-3: run the QEMU kernel suite across build-type × sanitizer
        # so UBSAN/LOCKDEP (already opt-in locally) become CI-resident regress
        # gates, and Debug (-O0) vs Release (-O2) both stay green (FO GOTCHA:
        # CMAKE_BUILD_TYPE default-empty first -O2 run). Parallel jobs.
        build_type: [Debug, Release]
        sanitizer: [none, ubsan, lockdep]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3

      - name: Compiler version
        run: echo "GCC $(gcc --version | head -1)"

      - name: Configure
        run: |
          ARGS="-DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCINUX_BUILD_TESTS=ON"
          if [ "${{ matrix.sanitizer }}" = "ubsan" ]; then ARGS="$ARGS -DCINUX_UBSAN=ON"; fi
          if [ "${{ matrix.sanitizer }}" = "lockdep" ]; then ARGS="$ARGS -DCINUX_LOCKDEP=ON"; fi
          cmake -B build $ARGS -S .

      - name: Build
        # Build twice: the first pass seeds the KALLSYMS table stub and its
        # POST_BUILD step regenerates the real table from nm; the second pass
        # compiles the real table into the test kernel (F-INFRA I-5). Without
        # the second pass the kernel runs with an empty symbol table.
        run: |
          cmake --build build -j$(nproc)
          cmake --build build -j$(nproc)

      - name: Run kernel tests
        working-directory: build
        # timeout 180 fails fast on a panic-loop/deadlock hang (normal run is
        # <60s); tee captures the full QEMU serial output to serial.log so the
        # next step can upload it as an artifact for post-mortem (kprintf /
        # panic / backtrace / memstats). pipefail propagates the test exit code
        # through tee.
        run: |
          set -o pipefail
          timeout 180 make run-kernel-test 2>&1 | tee serial.log

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-test-serial-log-${{ matrix.build_type }}-${{ matrix.sanitizer }}
          path: build/serial.log
          if-no-files-found: ignore
