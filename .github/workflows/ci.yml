name: Cinux CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  host-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3

      - name: Compiler version
        run: echo "GCC $(gcc --version | head -1)"

      - name: Configure
        # F-QA: CINUX_HOST_ASAN (ASAN+UBSAN+gcov) is a hard CI gate. DEBT-017
        # (the host ASAN findings Q1-5 first surfaced — test_pipe OOB,
        # FDTable File leaks, test_sys_pipe/test_multi_terminal ownership) is
        # fixed, so host tests now run sanitized: any UAF/OOB/leak in the
        # InodeOps/mock-layer code fails CI. Verified Release(-O2)+FORTIFY+ASAN
        # parity locally (F-QA Q2).
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -DCINUX_HOST_ASAN=ON -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Check memory layout (region/LBA overlap)
        # F-VERIFY M0-5: check_memory_layout.py was authored (parses linker
        # scripts + ELF PT_LOAD segments + disk LBA, exits 1 on overlap) but
        # never ran in CI -- so the MSI-X/xHCI BAR0 collision class was a
        # debug session, not a build failure. Wire it so a future static
        # overlap fails CI. (Runtime-allocated MMIO like xHCI BAR0 can't be
        # caught here -- that's a runtime self-test, tracked in M3/M6.)
        run: python3 scripts/check_memory_layout.py --mini-elf build/kernel/mini/mini_kernel --big-elf build/kernel/big/big_kernel

      - name: Run host tests
        working-directory: build
        run: make test_host

  host-tests-tsan:
    # F-VERIFY M4: ThreadSanitizer gate for the -pthread host tests (test_pmm
    # 4-thread alloc/free, test_sync_concurrent 8-thread lock stress). TSan is
    # mutually exclusive with ASan, so it is a separate job, not a cell on
    # host-tests. Catches data races in concurrent host test code (lockdep only
    # does lock-order; it cannot see two threads touching a field with no lock).
    # Value ramps as M2 links real kernel code into these tests.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3

      - name: Compiler version
        run: echo "GCC $(gcc --version | head -1)"

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -DCINUX_HOST_TSAN=ON -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run host tests (ThreadSanitizer)
        working-directory: build
        run: make test_host

  line-limits:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Check line-count limits
        run: python3 scripts/check_line_limits.py --hpp 500

      - name: Check freestanding headers
        run: python3 scripts/check_freestanding_headers.py

  kernel-tests:
    name: kernel-tests (${{ matrix.build_type }}, ${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # F-QA Q1-3: run the QEMU kernel suite across build-type × sanitizer
        # so UBSAN/LOCKDEP (already opt-in locally) become CI-resident regress
        # gates, and Debug (-O0) vs Release (-O2) both stay green (FO GOTCHA:
        # CMAKE_BUILD_TYPE default-empty first -O2 run). Parallel jobs.
        build_type: [Debug, Release]
        sanitizer: [none, ubsan, lockdep]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3 linux-libc-dev

      - name: Cache musl sysroot (ring-3 smoke)
        # P3: smoke is ON by default, so CI must build the musl user binaries
        # (/hello, /forktest) for the ext2 image. Cache the sysroot (~30s musl
        # build) keyed on build-musl.sh; the script is idempotent on libc.a so a
        # cache hit skips the download + compile.
        uses: actions/cache@v4
        with:
          path: build/musl-sysroot
          key: musl-${{ runner.os }}-${{ hashFiles('tools/musl/build-musl.sh') }}

      - name: Build musl user binaries (/hello, /forktest)
        run: |
          tools/musl/build-musl.sh
          tools/musl/build-hello.sh
          tools/musl/build-forktest.sh

      - name: Compiler version
        run: echo "GCC $(gcc --version | head -1)"

      - name: Configure
        run: |
          ARGS="-DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCINUX_BUILD_TESTS=ON"
          if [ "${{ matrix.sanitizer }}" = "ubsan" ]; then ARGS="$ARGS -DCINUX_UBSAN=ON"; fi
          if [ "${{ matrix.sanitizer }}" = "lockdep" ]; then ARGS="$ARGS -DCINUX_LOCKDEP=ON"; fi
          cmake -B build $ARGS -S .

      - name: Build
        # Build twice: the first pass seeds the KALLSYMS table stub and its
        # POST_BUILD step regenerates the real table from nm; the second pass
        # compiles the real table into the test kernel (F-INFRA I-5). Without
        # the second pass the kernel runs with an empty symbol table.
        run: |
          cmake --build build -j$(nproc)
          cmake --build build -j$(nproc)

      - name: Run kernel tests (single-CPU + -smp 2)
        working-directory: build
        # F-VERIFY: run-kernel-test-all runs the suite under single-CPU THEN
        # -smp 2 in one target, so CI can't forget the SMP variant (the 47/47
        # SMP-空转 blind spot was a process gap, not just code). Either leg
        # failing fails the build (wrapper maps isa-debug-exit). timeout 300
        # for two QEMU runs (each <60s normal). tee captures both legs to
        # serial.log for post-mortem; pipefail propagates the exit code.
        run: |
          set -o pipefail
          timeout 300 make run-kernel-test-all 2>&1 | tee serial.log

      - name: Check test count did not regress (F-QA Q1-4)
        # F-QA Q1-4: fail if fewer tests than baseline ran (silent test loss).
        # Runs only when the QEMU suite itself succeeded.
        working-directory: build
        run: bash ${{ github.workspace }}/scripts/check_test_count.sh serial.log

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-test-serial-log-${{ matrix.build_type }}-${{ matrix.sanitizer }}
          path: build/serial.log
          if-no-files-found: ignore

  busybox-smoke:
    # F-ECO: keep the real userland ecosystem gate as a dedicated job instead
    # of multiplying BusyBox build/download cost across the Debug/Release x
    # sanitizer kernel matrix.  This job builds the static BusyBox artifact,
    # enables CINUX_BUSYBOX_SMOKE, and runs both single-CPU and -smp 2 legs.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3 curl bzip2 linux-libc-dev

      - name: Cache musl sysroot
        uses: actions/cache@v4
        with:
          path: build/musl-sysroot
          key: musl-${{ runner.os }}-${{ hashFiles('tools/musl/build-musl.sh') }}

      - name: Cache BusyBox source/build
        uses: actions/cache@v4
        with:
          path: |
            build/busybox-src/busybox-*
            build/musl/busybox
          key: busybox-${{ runner.os }}-${{ hashFiles('tools/musl/build-busybox.sh', 'tools/musl/busybox-1.36.0.config') }}

      - name: Build musl + BusyBox user binaries
        run: |
          tools/musl/build-musl.sh
          tools/musl/build-hello.sh
          tools/musl/build-forktest.sh
          tools/musl/build-busybox.sh

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -DCINUX_BUSYBOX_SMOKE=ON -S .

      - name: Build
        run: |
          cmake --build build -j$(nproc)
          cmake --build build -j$(nproc)

      - name: Run BusyBox smoke (single-CPU + -smp 2)
        working-directory: build
        run: |
          set -o pipefail
          timeout 300 make run-kernel-test-all 2>&1 | tee busybox-serial.log

      - name: Upload BusyBox serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: busybox-smoke-serial-log
          path: build/busybox-serial.log
          if-no-files-found: ignore
